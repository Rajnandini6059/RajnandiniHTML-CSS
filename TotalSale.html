<!DOCTYPE html>
<html>
<head>
<title>Total Sales Report</title>

<style>
body{
    font-family: Arial;
    background-color: #f2f2f2;
}

h1{
    text-align: center;
}

table{
    margin: auto;
    border-collapse: collapse;
    background-color: white;
}

th, td{
    border: 1px solid black;
    padding: 10px 15px;
    text-align: center;
}
</style>

</head>

<body>

<h1>Monthly Total Sales Report</h1>

<table>
<tr>
    <th rowspan="2">Product</th>
    <th colspan="2">January</th>
    <th colspan="2">February</th>
</tr>

<tr>
    <th>Sales</th>
    <th>Profit</th>
    <th>Sales</th>
    <th>Profit</th>
</tr>

<tr>
    <td>Laptop</td>
    <td>50,000</td>
    <td>8,000</td>
    <td>45,000</td>
    <td>7,000</td>
</tr>

<tr>
    <td>Mobile</td>
    <td>30,000</td>
    <td>5,000</td>
    <td>35,000</td>
    <td>6,000</td>
</tr>

<tr>
    <td>Headphones</td>
    <td>15,000</td>
    <td>3,000</td>
    <td>18,000</td>
    <td>4,000</td>
</tr>

</table>

</body>
</html>
