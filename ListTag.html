<body>
    <h1>Types of Lists</h1>

<h2>Ordered List</h2>
<ol>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ol>
<h2>Ordered List</h2>
<ol type="i">
    <li>C</li>
    <li>CPP</li>
    <li>PYTHON</li>
</ol>
<h2>Ordered List</h2>
<ol type="a">
<li>Raj</li>
<li>Nandini</li>
<li>Rajnandini</li>
</ol>
<h2>Unordered List</h2>
<ul>
<li>Apple</li>
<li>Banana</li>
<li>Mango</li>
</ul>
<h2>Description List</h2>
<dl>
<dt>HTML</dt>
<dd>Web page structure</dd>
<dt>CSS</dt>
<dd>Web page design</dd>
</dl>
</body>
</html>
