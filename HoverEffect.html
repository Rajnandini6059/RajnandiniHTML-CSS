<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image and Anchor Tags with Attributes</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
<style>
body {
    text-align: center;
    background: linear-gradient(to right, #e0eafc, #cfdef3);
    font-family: Arial;
}
img {
    width: 350px;
    height: 350px;
    border-radius: 50%;
    border: 5px solid #4a6cf7;
    padding: 5px;
    box-shadow: 0px 0px 20px #4a6cf7;
    transition: all 0.4s ease-in-out;
}
img:hover{
    transform: scale(1.2);
}
</style>
</head>
<body>
<h1>Beautiful Image Effects</h1>
<img src="images/kim.jpg" alt="Decorated Image">
<p>Hover on the image to see effects</p>
</body>
</html>
